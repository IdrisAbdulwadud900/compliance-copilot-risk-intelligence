version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance_backend
    ports:
      - "8000:8000"
    environment:
      COMPLIANCE_DB_PATH: /data/compliance.db
      COMPLIANCE_DATABASE_URL: ${COMPLIANCE_DATABASE_URL:-}
      COMPLIANCE_ENV: ${COMPLIANCE_ENV:-production}
      COMPLIANCE_ALLOWED_ORIGINS: ${COMPLIANCE_ALLOWED_ORIGINS:?set COMPLIANCE_ALLOWED_ORIGINS}
      COMPLIANCE_JWT_SECRET: ${COMPLIANCE_JWT_SECRET:?set COMPLIANCE_JWT_SECRET}
      COMPLIANCE_WEBHOOK_SECRET: ${COMPLIANCE_WEBHOOK_SECRET:?set COMPLIANCE_WEBHOOK_SECRET}
      COMPLIANCE_API_KEYS: ${COMPLIANCE_API_KEYS:-}
    volumes:
      - compliance_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: compliance_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:8000}
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  compliance_data:
    driver: local

networks:
  default:
    name: compliance_network
